  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #0e0e12;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overscroll-behavior: none;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    #app {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* TOP BAR */
    .topbar {
      padding: 16px 20px 12px;
      flex-shrink: 0;
    }
    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .week-arrow {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,.5);
      font-size: 1.1rem;
      user-select: none;
      flex-shrink: 0;
      transition: background .15s;
    }
    .week-arrow:active { background: rgba(255,255,255,.15); }
    .week-label { font-family:'Syne',sans-serif; font-size:.88rem; font-weight:700; color:#f59e0b; flex:1; }
    .today-btn {
      font-family:'Inter',sans-serif; font-size:.7rem;
      background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.28);
      border-radius:8px; color:#f59e0b; padding:5px 10px; cursor:pointer;
    }
    .today-btn:active { background:rgba(245,158,11,.2); }
    .today-btn.hidden { opacity:0; pointer-events:none; }

    .header-row { display:flex; align-items:flex-end; justify-content:space-between; }
    .header-title { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:#fff; line-height:1; }
    .header-title span { color:#f59e0b; }
    .save-ind { font-size:.7rem; padding-bottom:3px; transition:color .3s; }

    /* CARRY BANNER */
    .carry-banner {
      margin: 0 20px 10px;
      display:flex; align-items:center; gap:8px;
      background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.22);
      border-radius:12px; padding:8px 14px;
      font-size:.78rem; color:#fbbf24;
      flex-shrink: 0;
    }
    .carry-banner.hidden { display:none; }
    .carry-dot { width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

    /* DAY STRIP */
    .day-strip {
      display:flex; gap:8px;
      padding: 0 20px 12px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .day-strip::-webkit-scrollbar { display:none; }
    .day-pill {
      flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; gap:5px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03);
      cursor:pointer; min-width:52px;
      transition: background .15s;
    }
    .day-pill:active { background:rgba(255,255,255,.1); }
    .day-pill.active { background:#f59e0b; border-color:#f59e0b; }
    .day-pill.today-ring { border-color:rgba(245,158,11,.4); }
    .day-name { font-family:'Syne',sans-serif; font-size:.74rem; font-weight:700; color:rgba(255,255,255,.5); letter-spacing:.4px; }
    .day-pill.active .day-name { color:#1a1a1a; }
    .dots { display:flex; gap:3px; height:5px; align-items:center; }
    .dot { width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.2); }
    .day-pill.active .dot { background:rgba(26,26,26,.35); }

    /* CARD */
    .card {
      flex: 1;
      margin: 0 12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding: 20px;
      display:flex; flex-direction:column;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-shrink:0; }
    .day-full { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; color:#fff; }
    .badge { font-family:'Inter',sans-serif; font-size:.72rem; color:rgba(255,255,255,.35); background:rgba(255,255,255,.06); padding:4px 10px; border-radius:20px; }

    .tabs { display:flex; background:rgba(255,255,255,.05); border-radius:12px; padding:4px; margin-bottom:16px; flex-shrink:0; }
    .tab {
      flex:1; padding:9px 0; border:none; background:transparent;
      border-radius:9px; font-family:'Syne',sans-serif; font-size:.82rem; font-weight:700;
      color:rgba(255,255,255,.35); cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:5px;
      transition: background .2s;
    }
    .tab.p-active { background:#818cf8; color:#fff; }
    .tab.w-active { background:#f59e0b; color:#1a1a1a; }
    .tcnt { display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:.65rem;background:rgba(255,255,255,.12); }
    .tab.p-active .tcnt { background:rgba(255,255,255,.25); }
    .tab.w-active .tcnt { background:rgba(26,26,26,.2); }

    .input-row { display:flex; gap:8px; margin-bottom:14px; flex-shrink:0; }
    .inp {
      flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      border-radius:12px; padding:12px 14px; color:#fff;
      font-family:'Inter',sans-serif; font-size:.95rem; outline:none;
    }
    .inp::placeholder { color:rgba(255,255,255,.25); }
    .inp:focus { border-color:rgba(129,140,248,.5); background:rgba(255,255,255,.09); }
    .inp.w:focus { border-color:rgba(245,158,11,.5); }
    .add-btn {
      border:none; border-radius:12px; width:44px; height:44px;
      font-size:1.4rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .add-btn.p { background:#818cf8; color:#fff; }
    .add-btn.w { background:#f59e0b; color:#1a1a1a; }
    .add-btn:active { transform:scale(0.93); }

    .list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-right:2px; }
    .list::-webkit-scrollbar { width:3px; }
    .list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1);border-radius:4px; }

    .item {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
      border-radius:12px; padding:12px 12px;
      animation: fi .2s ease;
      flex-shrink: 0;
    }
    @keyframes fi { from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)} }
    .item.carried { background:rgba(245,158,11,.06); border-color:rgba(245,158,11,.28); }
    .carried-tag { font-size:.6rem; color:#f59e0b; background:rgba(245,158,11,.14); border:1px solid rgba(245,158,11,.28); border-radius:4px; padding:2px 5px; white-space:nowrap; flex-shrink:0; }

    .chk {
      width:24px; height:24px; border-radius:8px; border:2px solid rgba(255,255,255,.15);
      flex-shrink:0; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; color:transparent; font-weight:700;
      transition: all .15s;
    }
    .chk.pc { border-color:#818cf8; }
    .chk.pc.on { background:#818cf8; border-color:#818cf8; color:#fff; }
    .chk.wc { border-color:#f59e0b; }
    .chk.wc.on { background:#f59e0b; border-color:#f59e0b; color:#1a1a1a; }
    .chk.cc { border-color:rgba(245,158,11,.55); }
    .chk.cc.on { background:#f59e0b; border-color:#f59e0b; color:#1a1a1a; }

    .txt { flex:1; font-size:.88rem; color:rgba(255,255,255,.82); line-height:1.4; word-break:break-word; }
    .txt.done { text-decoration:line-through; color:rgba(255,255,255,.25); }
    .del { background:none; border:none; color:rgba(255,255,255,.2); font-size:.9rem; cursor:pointer; padding:6px; border-radius:6px; line-height:1; }
    .del:active { color:#f87171; }

    .empty { text-align:center; padding:30px 0; font-size:.85rem; color:rgba(255,255,255,.18); flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ei { font-size:2.2rem; margin-bottom:10px; opacity:.35; }

    .foot { margin-top:12px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .pbar-wrap { flex:1; height:3px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; }
    .pbar { height:100%; border-radius:4px; transition:width .4s ease; }
    .pbar.p { background:#818cf8; }
    .pbar.w { background:#f59e0b; }
    .clr { font-size:.72rem; background:none; border:none; color:rgba(248,113,113,.5); cursor:pointer; padding:4px 6px; border-radius:6px; }
    .clr:active { color:#f87171; }

    /* Install banner */
    #install-banner {
      position:fixed; bottom:0; left:0; right:0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-top:1px solid rgba(245,158,11,.3);
      padding:16px 20px;
      display:flex; align-items:center; gap:12px;
      z-index:100;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
    }
    #install-banner.hidden { display:none; }
    .install-text { flex:1; font-size:.82rem; color:rgba(255,255,255,.7); line-height:1.4; }
    .install-text strong { color:#f59e0b; display:block; font-size:.88rem; margin-bottom:2px; }
    .install-btn {
      background:#f59e0b; color:#1a1a1a; border:none; border-radius:10px;
      padding:10px 16px; font-family:'Syne',sans-serif; font-weight:700; font-size:.82rem;
      cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .dismiss-btn { background:none; border:none; color:rgba(255,255,255,.3); font-size:1.1rem; cursor:pointer; padding:4px; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="week-nav">
      <div class="week-arrow" id="prevWeek">‹</div>
      <div class="week-label" id="weekLabel"></div>
      <button class="today-btn hidden" id="todayBtn">Bugün</button>
      <div class="week-arrow" id="nextWeek">›</div>
    </div>
    <div class="header-row">
      <div class="header-title">K-CheckList</div>
      <div class="save-ind" id="saveInd" style="color:rgba(255,255,255,.15)">◦ Kayıtlı</div>
    </div>
  </div>

  <div class="carry-banner hidden" id="carryBanner">
    <div class="carry-dot"></div>
    <span id="carryText"></span>
  </div>

  <div class="day-strip" id="dayStrip"></div>

  <div class="card">
    <div class="card-top">
      <div class="day-full" id="dayFull"></div>
      <div class="badge" id="badge"></div>
    </div>
    <div class="tabs">
      <button class="tab p-active" id="tabPersonal" onclick="setTab('Personal')">👤 Personal <span class="tcnt" id="cntPersonal">0</span></button>
      <button class="tab" id="tabIs" onclick="setTab('İş')">💼 İş <span class="tcnt" id="cntIs">0</span></button>
    </div>
    <div class="input-row">
      <input class="inp" id="todoInput" placeholder="Görev ekle..." />
      <button class="add-btn p" id="addBtn" onclick="addTodo()">+</button>
    </div>
    <div class="list" id="list"></div>
    <div class="foot" id="foot" style="display:none">
      <div class="pbar-wrap"><div class="pbar p" id="pbar" style="width:0%"></div></div>
      <button class="clr" id="clrBtn" style="display:none" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>
</div>

<div id="install-banner" class="hidden">
  <div class="install-text">
    <strong>📱 Ana Ekrana Ekle</strong>
    Uygulamayı telefonuna yükle, çevrimdışı çalışır!
  </div>
  <button class="install-btn" id="installBtn">Yükle</button>
  <button class="dismiss-btn" onclick="dismissInstall()">✕</button>
</div>

<script>
const DAYS = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
const FULL_DAYS = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
const STORAGE_KEY = "gorev-pwa-data";

// ---- Date helpers ----
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - ((d.getDay()+6)%7));
  const w1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
}
function getMondayOfWeek(year, week) {
  const jan4 = new Date(year,0,4);
  const dow = (jan4.getDay()+6)%7;
  const mon = new Date(jan4);
  mon.setDate(jan4.getDate() - dow + (week-1)*7);
  return mon;
}
function fmt(date, withYear=false) {
  const d = String(date.getDate()).padStart(2,"0");
  const m = String(date.getMonth()+1).padStart(2,"0");
  return withYear ? `${d}.${m}.${date.getFullYear()}` : `${d}.${m}`;
}
function getWeekLabel(year, week) {
  const mon = getMondayOfWeek(year, week);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return `W${week}: ${fmt(mon)}-${fmt(sun,true)}`;
}
function getMaxWeek(year) { return getISOWeek(new Date(year,11,28)); }
function weekKey(y,w) { return `${y}-W${w}`; }
function emptyWeek() {
  const d={};
  DAYS.forEach(day=>{ d[day]={Personal:[],İş:[]}; });
  return d;
}

// ---- State ----
const now = new Date();
const todayIdx = now.getDay()===0?6:now.getDay()-1;
const curWeek = getISOWeek(now);
const curYear = now.getFullYear();

let state = {
  weekNum: curWeek,
  weekYear: curYear,
  selectedDay: DAYS[todayIdx],
  activeTab: "Personal",
  allWeeks: {}
};
state.allWeeks[weekKey(curYear,curWeek)] = emptyWeek();

// ---- Storage ----
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.allWeeks)); } catch(_){}
  showSaveStatus("saving");
  setTimeout(()=>showSaveStatus("saved"),400);
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) { state.allWeeks = JSON.parse(raw); }
  } catch(_){}
}
function showSaveStatus(s) {
  const el = document.getElementById("saveInd");
  if(s==="saving") { el.style.color="rgba(255,255,255,.3)"; el.textContent="↑ Kaydediliyor"; }
  else if(s==="saved") {
    el.style.color="#4ade80"; el.textContent="✓ Kaydedildi";
    setTimeout(()=>{ el.style.color="rgba(255,255,255,.15)"; el.textContent="◦ Kayıtlı"; },2000);
  }
}

// ---- Week management ----
function ensureWeek(y, w) {
  const k = weekKey(y,w);
  if(state.allWeeks[k]) return;
  let pw=w-1, py=y;
  if(pw<1){ py--; pw=getMaxWeek(py); }
  const pk=weekKey(py,pw);
  const prev=state.allWeeks[pk];
  const nw=emptyWeek();
  if(prev){
    ["Personal","İş"].forEach(tab=>{
      DAYS.forEach(day=>{
        const unfinished=(prev[day]?.[tab]||[]).filter(t=>!t.done).map(t=>({...t,carriedOver:true,id:Date.now()+Math.random()}));
        nw["Pzt"][tab]=[...nw["Pzt"][tab],...unfinished];
      });
    });
  }
  state.allWeeks[k]=nw;
}

function getWeekData() {
  const k=weekKey(state.weekYear,state.weekNum);
  ensureWeek(state.weekYear,state.weekNum);
  return state.allWeeks[k];
}

function getTodos() {
  const wd=getWeekData();
  return (wd[state.selectedDay]?.[state.activeTab])||[];
}

// ---- Render ----
function render() {
  const isCurrentWeek = state.weekNum===curWeek && state.weekYear===curYear;

  // Week label
  document.getElementById("weekLabel").textContent = getWeekLabel(state.weekYear,state.weekNum);
  const todayBtn=document.getElementById("todayBtn");
  if(isCurrentWeek) todayBtn.classList.add("hidden"); else todayBtn.classList.remove("hidden");

  // Carry banner
  const wd=getWeekData();
  const carriedCount = (wd["Pzt"]?.Personal||[]).filter(t=>t.carriedOver).length +
                       (wd["Pzt"]?.["İş"]||[]).filter(t=>t.carriedOver).length;
  const banner=document.getElementById("carryBanner");
  if(state.selectedDay==="Pzt" && carriedCount>0){
    banner.classList.remove("hidden");
    document.getElementById("carryText").textContent=`Geçen haftadan ${carriedCount} tamamlanmamış görev Pazartesi'ye taşındı`;
  } else {
    banner.classList.add("hidden");
  }

  // Day strip
  const strip=document.getElementById("dayStrip");
  strip.innerHTML="";
  DAYS.forEach((day,i)=>{
    const count=(wd[day]?.Personal?.length||0)+(wd[day]?.["İş"]?.length||0);
    const isToday=isCurrentWeek&&i===todayIdx;
    const active=state.selectedDay===day;
    const pill=document.createElement("div");
    pill.className=`day-pill${active?" active":""}${isToday&&!active?" today-ring":""}`;
    pill.innerHTML=`<span class="day-name">${day}</span><div class="dots">${Array(Math.min(count||1,3)).fill(0).map((_,j)=>`<div class="dot"${count===0?' style="opacity:.15"':''}></div>`).join("")}</div>`;
    pill.onclick=()=>{ state.selectedDay=day; render(); };
    strip.appendChild(pill);
  });

  // Card header
  document.getElementById("dayFull").textContent=FULL_DAYS[DAYS.indexOf(state.selectedDay)];

  // Tabs
  const todos=getTodos();
  const pCount=(wd[state.selectedDay]?.Personal||[]).length;
  const wCount=(wd[state.selectedDay]?.["İş"]||[]).length;
  document.getElementById("cntPersonal").textContent=pCount;
  document.getElementById("cntIs").textContent=wCount;
  document.getElementById("tabPersonal").className=`tab${state.activeTab==="Personal"?" p-active":""}`;
  document.getElementById("tabIs").className=`tab${state.activeTab==="İş"?" w-active":""}`;

  // Input style
  const inp=document.getElementById("todoInput");
  inp.className=`inp${state.activeTab==="İş"?" w":""}`;
  inp.placeholder=`${FULL_DAYS[DAYS.indexOf(state.selectedDay)]} ${state.activeTab==="Personal"?"kişisel":"iş"} görevi...`;
  const addBtn=document.getElementById("addBtn");
  addBtn.className=`add-btn${state.activeTab==="Personal"?" p":" w"}`;

  // Badge
  const remaining=todos.filter(t=>!t.done).length;
  document.getElementById("badge").textContent=`${remaining} kaldı`;

  // List
  const list=document.getElementById("list");
  list.innerHTML="";
  if(todos.length===0){
    const empty=document.createElement("div");
    empty.className="empty";
    empty.innerHTML=`<div class="ei">${state.activeTab==="Personal"?"🌙":"📋"}</div><div>Henüz görev yok</div>`;
    list.appendChild(empty);
  } else {
    todos.forEach(todo=>{
      const isP=state.activeTab==="Personal";
      const isC=!!todo.carriedOver;
      const item=document.createElement("div");
      item.className=`item${isC?" carried":""}`;
      item.innerHTML=`
        <div class="chk ${isC?"cc":isP?"pc":"wc"}${todo.done?" on":""}" data-id="${todo.id}">${todo.done?"✓":""}</div>
        <span class="txt${todo.done?" done":""}">${escHtml(todo.text)}</span>
        ${isC?'<span class="carried-tag">◈ önceki hafta</span>':""}
        <button class="del" data-id="${todo.id}">✕</button>
      `;
      item.querySelector(".chk").onclick=()=>toggleTodo(todo.id);
      item.querySelector(".del").onclick=()=>deleteTodo(todo.id);
      list.appendChild(item);
    });
  }

  // Footer
  const foot=document.getElementById("foot");
  const pbar=document.getElementById("pbar");
  const clrBtn=document.getElementById("clrBtn");
  if(todos.length>0){
    foot.style.display="flex";
    const done=todos.filter(t=>t.done).length;
    pbar.style.width=`${(done/todos.length)*100}%`;
    pbar.className=`pbar${state.activeTab==="Personal"?" p":" w"}`;
    clrBtn.style.display=todos.some(t=>t.done)?"block":"none";
  } else {
    foot.style.display="none";
  }
}

function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ---- Actions ----
function addTodo(){
  const inp=document.getElementById("todoInput");
  const text=inp.value.trim();
  if(!text) return;
  const k=weekKey(state.weekYear,state.weekNum);
  state.allWeeks[k][state.selectedDay][state.activeTab].unshift({id:Date.now(),text,done:false,carriedOver:false});
  inp.value="";
  save(); render();
}

function toggleTodo(id){
  const k=weekKey(state.weekYear,state.weekNum);
  const list=state.allWeeks[k][state.selectedDay][state.activeTab];
  const t=list.find(t=>t.id===id);
  if(t) t.done=!t.done;
  save(); render();
}

function deleteTodo(id){
  const k=weekKey(state.weekYear,state.weekNum);
  state.allWeeks[k][state.selectedDay][state.activeTab]=
    state.allWeeks[k][state.selectedDay][state.activeTab].filter(t=>t.id!==id);
  save(); render();
}

function clearDone(){
  const k=weekKey(state.weekYear,state.weekNum);
  state.allWeeks[k][state.selectedDay][state.activeTab]=
    state.allWeeks[k][state.selectedDay][state.activeTab].filter(t=>!t.done);
  save(); render();
}

function setTab(tab){ state.activeTab=tab; render(); }

// Week nav
document.getElementById("prevWeek").onclick=()=>{
  if(state.weekNum===1){ const py=state.weekYear-1; state.weekYear=py; state.weekNum=getMaxWeek(py); }
  else state.weekNum--;
  state.selectedDay="Pzt";
  ensureWeek(state.weekYear,state.weekNum);
  render();
};
document.getElementById("nextWeek").onclick=()=>{
  const max=getMaxWeek(state.weekYear);
  if(state.weekNum===max){ state.weekYear++; state.weekNum=1; }
  else state.weekNum++;
  state.selectedDay="Pzt";
  ensureWeek(state.weekYear,state.weekNum);
  render();
};
document.getElementById("todayBtn").onclick=()=>{
  state.weekNum=curWeek; state.weekYear=curYear;
  state.selectedDay=DAYS[todayIdx];
  render();
};

// Enter key
document.getElementById("todoInput").addEventListener("keydown",e=>{ if(e.key==="Enter") addTodo(); });

// ---- PWA Install ----
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("install-banner").classList.remove("hidden");
});
document.getElementById("installBtn").onclick=async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById("install-banner").classList.add("hidden");
};
function dismissInstall(){
  document.getElementById("install-banner").classList.add("hidden");
}
window.addEventListener("appinstalled",()=>{
  document.getElementById("install-banner").classList.add("hidden");
});

// ---- Service Worker (offline support) ----
if("serviceWorker" in navigator){
  const swCode=`
    const CACHE="gorev-v1";
    const ASSETS=["/"];
    self.addEventListener("install",e=>{ e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))); self.skipWaiting(); });
    self.addEventListener("activate",e=>{ e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
    self.addEventListener("fetch",e=>{ e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("/")))); });
  `;
  const swBlob=new Blob([swCode],{type:"application/javascript"});
  const swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ---- Boot ----
load();
render();
</script>
</body>
</html>
